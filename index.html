<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Super Cam - Blur & Kicau</title>
    <style>
        :root {
            --bg-grad-1: #0f2027; --bg-grad-2: #203a43; --bg-grad-3: #2c5364;
            --neon-blue: #00e5ff; --neon-green: #39ff14; --neon-red: #ff2a2a; --neon-yellow: #ffea00;
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            color: white; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box;
        }
        .container { width: 100%; max-width: 400px; position: relative; }
        .card { 
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.37); text-align: center;
        }
        .header-title h1 { 
            margin: 0; font-size: 26px; font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        button { 
            width: 100%; background: linear-gradient(90deg, var(--neon-blue), #007bb5);
            color: white; border: none; border-radius: 12px; padding: 16px; 
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.02); }
        .hidden { display: none !important; }
        .video-wrapper { 
            position: relative; width: 100%; aspect-ratio: 3/4; background: #000; 
            border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #webcam, #output_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transform: scale(1.25) scaleX(-1);
        }
        #webcam { z-index: 1; }
        #output_canvas { z-index: 5; pointer-events: none; }
        
        #angka-countdown { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; font-weight: 900; color: white; z-index: 10; 
            text-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 10px var(--neon-yellow);
        }
        #gif-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 8; pointer-events: none; }
        .kicau-gif {
            position: absolute; width: 75px; opacity: 0; transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .kicau-gif.show { opacity: 1; transform: scale(1) scaleX(-1); }
        .camera-status { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 12px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="landing-page" class="container">
        <div class="card">
            <div class="header-title"><h1>AI SUPER CAM</h1></div>
            <p style="line-height: 1.6;">
                ✌️ <strong>Telunjuk + Tengah</strong><br><span style="color:var(--neon-blue); font-size:12px;">Mode Foto Blur</span><br><br>
                👋 <strong>Telapak Terbuka + Sentuh Hidung</strong><br><span style="color:var(--neon-green); font-size:12px;">Mode Kicau Mania</span>
            </p>
            <button onclick="mulaiAplikasi()">START CAMERA</button>
        </div>
    </div>

    <div id="camera-page" class="container hidden">
        <div class="card">
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="output_canvas"></canvas>
                
                <div id="gif-container" class="hidden">
                    <img src="1000027759.gif" class="kicau-gif" style="top: 8%; left: 5%;">
                    <img src="1000027759.gif" class="kicau-gif" style="top: 12%; right: 5%;">
                    <img src="1000027759.gif" class="kicau-gif" style="top: 40%; left: 2%;">
                    <img src="1000027759.gif" class="kicau-gif" style="top: 40%; right: 2%;">
                    <img src="1000027759.gif" class="kicau-gif" style="bottom: 15%; left: 10%;">
                    <img src="1000027759.gif" class="kicau-gif" style="bottom: 15%; right: 10%;">
                </div>
                <div id="angka-countdown" class="hidden">3</div>
            </div>

            <div class="camera-status">
                <div id="status-text" style="color: var(--neon-yellow); font-weight: bold;">MENYIAPKAN AI...</div>
                <div id="song-indicator" style="margin-top: 5px;">Mohon tunggu sebentar...</div>
            </div>
        </div>
    </div>

    <audio id="musik-blur" preload="auto"><source src="lagufotoblur.mp3" type="audio/mpeg"></audio>
    <audio id="musik-kicau" preload="auto"><source src="kicaumania.mp3" type="audio/mpeg"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js"></script>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gifContainer = document.getElementById('gif-container');
        const statusText = document.getElementById('status-text');
        const songIndicator = document.getElementById('song-indicator');
        const angkaCountdown = document.getElementById('angka-countdown');

        const audioBlur = document.getElementById('musik-blur');
        const audioKicau = document.getElementById('musik-kicau');

        let activeMode = null; // Blur atau Kicau
        let countingMode = null;
        let holdStartTime = 0;
        let gifTimer;
        
        let detectedFaces = [];
        let isAiReady = false;

        function updateStatus(text, color, song = "") {
            statusText.textContent = text;
            statusText.style.color = color;
            if (song) songIndicator.textContent = song;
        }

        async function mulaiAplikasi() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('camera-page').classList.remove('hidden');
            updateStatus("MEMUAT MODEL AI...", "#ffea00", "Beri izin kamera jika diminta");

            // Setup Face Detection
            const faceDetection = new FaceDetection({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${file}`});
            faceDetection.setOptions({ modelSelection: 0, minDetectionConfidence: 0.5 });
            faceDetection.onResults((results) => { 
                detectedFaces = results.detections || []; 
            });

            // Setup Hand Tracking
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`});
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
            hands.onResults(onResultsHands);

            // Kamera Berjalan
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    if (videoElement.videoWidth === 0) return;
                    if (canvasElement.width !== videoElement.videoWidth) {
                        canvasElement.width = videoElement.videoWidth;
                        canvasElement.height = videoElement.videoHeight;
                    }
                    
                    // Eksekusi bersamaan (Promise.all) agar framerate tidak drop dan garis bisa ditarik
                    await Promise.all([
                        faceDetection.send({image: videoElement}),
                        hands.send({image: videoElement})
                    ]);
                },
                width: 640, height: 480, facingMode: "user"
            });

            camera.start().catch(err => {
                updateStatus("GAGAL MENGAKSES KAMERA", "#ff2a2a", "Pastikan izin diberikan");
                console.error(err);
            });
        }

        function onResultsHands(results) {
            if (!isAiReady) {
                isAiReady = true;
                updateStatus("AI READY", "#39ff14", "🎵 Tunjukkan Gesture Anda");
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            let gayaDuaJari = false;
            let gayaScuba = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    
                    // 1. Gambar rangka tangan (Visual)
                    canvasCtx.strokeStyle = '#00e5ff';
                    canvasCtx.lineWidth = 4;
                    const fingers = [[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20]];
                    canvasCtx.beginPath();
                    for (let finger of fingers) {
                        for (let i = 0; i < finger.length-1; i++) {
                            const a = landmarks[finger[i]];
                            const b = landmarks[finger[i+1]];
                            canvasCtx.moveTo(a.x * canvasElement.width, a.y * canvasElement.height);
                            canvasCtx.lineTo(b.x * canvasElement.width, b.y * canvasElement.height);
                        }
                    }
                    canvasCtx.stroke();

                    canvasCtx.fillStyle = '#ffea00';
                    landmarks.forEach(p => {
                        canvasCtx.beginPath();
                        canvasCtx.arc(p.x * canvasElement.width, p.y * canvasElement.height, 5, 0, 2*Math.PI);
                        canvasCtx.fill();
                    });

                    // 2. Logika Deteksi Jari yang Presisi
                    const isIndexUp = landmarks[8].y < landmarks[6].y;
                    const isMiddleUp = landmarks[12].y < landmarks[10].y;
                    const isRingUp = landmarks[16].y < landmarks[14].y;
                    const isPinkyUp = landmarks[20].y < landmarks[18].y;

                    // Telapak tangan terbuka (semua jari utama naik)
                    const palmOpen = isIndexUp && isMiddleUp && isRingUp && isPinkyUp;
                    
                    // Pose Peace (Telunjuk & Tengah naik, Sisanya turun)
                    if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) {
                        gayaDuaJari = true;
                    }

                    // 3. Deteksi Jarak Jari ke Hidung
                    if (detectedFaces.length > 0 && detectedFaces[0].landmarks) {
                        const nose = detectedFaces[0].landmarks[2]; // Index 2 = Ujung Hidung
                        let isCloseToNose = false;

                        const tips = [4,8,12,16,20];
                        tips.forEach(idx => {
                            const tip = landmarks[idx];
                            const dist = Math.hypot(tip.x - nose.x, tip.y - nose.y);
                            
                            // Jarak toleransi ke hidung
                            if (dist < 0.15) isCloseToNose = true;

                            // Tarik Garis Visual Jarak
                            canvasCtx.strokeStyle = dist < 0.15 ? '#39ff14' : '#ff2a2a';
                            canvasCtx.lineWidth = 3;
                            canvasCtx.setLineDash([5, 5]);
                            canvasCtx.beginPath();
                            canvasCtx.moveTo(tip.x * canvasElement.width, tip.y * canvasElement.height);
                            canvasCtx.lineTo(nose.x * canvasElement.width, nose.y * canvasElement.height);
                            canvasCtx.stroke();
                        });
                        canvasCtx.setLineDash([]); // Reset garis putus-putus

                        if (palmOpen && isCloseToNose) gayaScuba = true;
                    }
                }
            }
            canvasCtx.restore();

            // 4. Manajer Logika Countdown (Akan berhenti otomatis jika user merubah gesture)
            if (activeMode) return; // Jika lagu sedang main, tahan semua tracking

            if (gayaScuba) {
                jalankanHitungMundur('kicau');
            } else if (gayaDuaJari) {
                jalankanHitungMundur('blur');
            } else {
                batalkanHitungMundur();
            }
        }

        function jalankanHitungMundur(targetMode) {
            if (countingMode !== targetMode) {
                countingMode = targetMode;
                holdStartTime = Date.now();
                angkaCountdown.classList.remove('hidden');
            }

            // Menghitung sisa detik (3 detik)
            const terlewati = Date.now() - holdStartTime;
            const sisaWaktu = Math.ceil((3000 - terlewati) / 1000);

            if (sisaWaktu > 0) {
                angkaCountdown.textContent = sisaWaktu;
                updateStatus(`TAHAN GESTURE... ${sisaWaktu}`, "#ffca3a");
            } else {
                // Eksekusi jika berhasil ditahan 3 detik
                activeMode = targetMode;
                batalkanHitungMundur(); 
                
                if (targetMode === 'blur') {
                    audioBlur.play();
                    updateStatus("📸 MODE FOTO BLUR AKTIF", "#39ff14", "🎵 Sal Priadi - Foto Kita Blur");
                } else {
                    audioKicau.play();
                    startGifs();
                    updateStatus("🐦 KICAU MANIA AKTIF", "#00e5ff", "🎵 Kicau Mania");
                }
            }
        }

        function batalkanHitungMundur() {
            if (countingMode) {
                countingMode = null;
                angkaCountdown.classList.add('hidden');
                updateStatus("AI READY", "#39ff14", "🎵 Tunjukkan Gesture Anda");
            }
        }

        function startGifs() {
            gifContainer.classList.remove('hidden');
            const gifs = document.querySelectorAll('.kicau-gif');
            gifs.forEach(g => g.classList.remove('show'));
            let i = 0;
            gifTimer = setInterval(() => {
                if (i < gifs.length) gifs[i++].classList.add('show');
                else clearInterval(gifTimer);
            }, 400);
        }

        function resetSystem() {
            clearInterval(gifTimer);
            activeMode = null;
            batalkanHitungMundur();
            
            audioBlur.pause(); audioBlur.currentTime = 0;
            audioKicau.pause(); audioKicau.currentTime = 0;
            gifContainer.classList.add('hidden');
            
            updateStatus("AI READY", "#39ff14", "🎵 Tunjukkan Gesture Anda");
        }

        // Reset system saat audio selesai
        audioBlur.addEventListener('ended', resetSystem);
        audioKicau.addEventListener('ended', resetSystem);
    </script>
</body>
</html>
