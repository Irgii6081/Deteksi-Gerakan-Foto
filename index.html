<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Super Cam - Blur & Kicau</title>
    <style>
        :root {
            --bg-grad-1: #0f2027; --bg-grad-2: #203a43; --bg-grad-3: #2c5364;
            --neon-blue: #00e5ff; --neon-green: #39ff14; --neon-red: #ff2a2a; --neon-yellow: #ffea00;
        }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            color: white; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box;
        }
        .container { width: 100%; max-width: 400px; position: relative; }
        .card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; 
            padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center;
        }
        button { 
            width: 100%; background: linear-gradient(90deg, var(--neon-blue), #007bb5);
            color: white; border: none; border-radius: 12px; padding: 16px; 
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .hidden { display: none !important; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 16px; overflow: hidden; }
        #webcam, #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scale(1.25) scaleX(-1); }
        #output_canvas { z-index: 5; pointer-events: none; }
        #angka-countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: 900; z-index: 10; text-shadow: 0 0 20px #000; }
    </style>
</head>
<body>

    <div id="landing-page" class="container">
        <div class="card">
            <h1 style="background: linear-gradient(90deg,#00e5ff,#39ff14);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">AI SUPER CAM</h1>
            <p>✌️ Dua Jari = Blur<br>👋 Telapak Terbuka + Sentuh Hidung = Kicau Mania</p>
            <button onclick="mulaiAplikasi()">START CAMERA</button>
        </div>
    </div>

    <div id="camera-page" class="container hidden">
        <div class="card">
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="output_canvas"></canvas>
                <div id="gif-container" class="hidden"></div>
                <div id="angka-countdown" class="hidden">3</div>
            </div>
            <div style="margin-top:15px; padding:15px; background:rgba(0,0,0,0.4); border-radius:12px; text-align:center;">
                <div id="status-text" style="color:#ffea00; font-weight:bold;">MENYIAPKAN AI...</div>
                <div id="song-indicator" style="font-size:13px; margin-top:5px;">Mohon tunggu...</div>
            </div>
        </div>
    </div>

    <audio id="musik-blur" preload="auto"><source src="lagufotoblur.mp3" type="audio/mpeg"></audio>
    <audio id="musik-kicau" preload="auto"><source src="kicaumania.mp3" type="audio/mpeg"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>

    <script>
        let isAiReady = false;
        let activeMode = null;
        let countingMode = null;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');

        async function mulaiAplikasi() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('camera-page').classList.remove('hidden');

            statusText.textContent = "LOADING MODEL...";

            const faceDetection = new FaceDetection({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${f}`});
            faceDetection.setOptions({minDetectionConfidence: 0.5});

            const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({maxNumHands: 2, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});

            hands.onResults(onResults);

            const camera = new Camera(video, {
                onFrame: async () => {
                    if (canvas.width !== video.videoWidth) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                    }
                    await faceDetection.send({image: video});
                    await hands.send({image: video});
                },
                width: 640, height: 480, facingMode: "user"
            });

            try {
                await camera.start();
                statusText.textContent = "AI SIAP - TUNJUKKAN GESTURE";
                statusText.style.color = "#39ff14";
            } catch (e) {
                statusText.textContent = "GAGAL MENGAKSES KAMERA";
                statusText.style.color = "red";
                console.error(e);
            }
        }

        function onResults(results) {
            if (!isAiReady) {
                isAiReady = true;
                console.log("✅ MediaPipe Ready");
            }

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let gayaBlur = false;
            let gayaKicau = false;

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Draw hand
                    ctx.strokeStyle = '#00e5ff';
                    ctx.lineWidth = 4;
                    const fingers = [[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20]];
                    ctx.beginPath();
                    for (let finger of fingers) {
                        for (let i = 0; i < finger.length-1; i++) {
                            const a = landmarks[finger[i]];
                            const b = landmarks[finger[i+1]];
                            ctx.moveTo(a.x * canvas.width, a.y * canvas.height);
                            ctx.lineTo(b.x * canvas.width, b.y * canvas.height);
                        }
                    }
                    ctx.stroke();

                    // Joints
                    ctx.fillStyle = '#ffea00';
                    landmarks.forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x*canvas.width, p.y*canvas.height, 5, 0, Math.PI*2);
                        ctx.fill();
                    });

                    // Gesture Blur
                    if (landmarks[8].y < landmarks[6].y - 0.05 && landmarks[12].y < landmarks[10].y - 0.05) {
                        gayaBlur = true;
                    }

                    // Gesture Kicau
                    if (results.detections && results.detections.length > 0) {
                        const nose = results.detections[0].landmarks[2];
                        let close = false;

                        [4,8,12,16,20].forEach(i => {
                            const tip = landmarks[i];
                            const dist = Math.hypot(tip.x - nose.x, tip.y - nose.y);
                            if (dist < 0.12) close = true;

                            // Garis jarak
                            ctx.strokeStyle = dist < 0.12 ? '#39ff14' : '#ff2a2a';
                            ctx.lineWidth = 3;
                            ctx.beginPath();
                            ctx.moveTo(tip.x*canvas.width, tip.y*canvas.height);
                            ctx.lineTo(nose.x*canvas.width, nose.y*canvas.height);
                            ctx.stroke();
                        });

                        const palmOpen = landmarks[8].y < landmarks[6].y && landmarks[12].y < landmarks[10].y;
                        if (palmOpen && close) gayaKicau = true;
                    }
                }
            }

            ctx.restore();

            // Update status
            if (gayaKicau) statusText.textContent = "KICAU DETECTED!";
            else if (gayaBlur) statusText.textContent = "BLUR DETECTED!";
            else if (isAiReady) statusText.textContent = "AWAITING GESTURE";
        }
    </script>
</body>
</html>
