<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Kita Blur .</title>
    <style>
        :root {
            --bg-pink: #ff529a;
            --btn-green: #4ade80;
            --box-cyan: #06b6d4;
            --border-black: 3px solid black;
            --shadow-black: 6px 6px 0px black;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-pink);
            background-image: radial-gradient(#cc3574 2px, transparent 2px); background-size: 20px 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; box-sizing: border-box;
        }

        .container { width: 100%; max-width: 420px; position: relative; }
        .card { background: white; border: var(--border-black); box-shadow: var(--shadow-black); padding: 25px; margin-bottom: 20px; position: relative; }
        
        .top-badge { background: var(--btn-green); border: var(--border-black); padding: 5px 15px; font-weight: bold; font-size: 12px; position: absolute; top: -15px; left: 20px; z-index: 10; }
        .header-title { display: flex; align-items: center; gap: 15px; margin-top: 10px; margin-bottom: 20px; }
        .icon-box { background: var(--box-cyan); border: var(--border-black); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 4px 4px 0px black; }
        h1 { margin: 0; font-size: 26px; line-height: 1.1; text-transform: uppercase; }
        p { font-family: monospace; font-size: 14px; margin-bottom: 20px; }
        hr { border: 0; border-top: 3px solid black; margin: 20px 0; }
        .dashed-line { border-top: 1px dashed black; }

        button { width: 100%; background: var(--btn-green); color: black; border: var(--border-black); box-shadow: var(--shadow-black); padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.1s; }
        button:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px black; }

        .info-text { font-family: monospace; font-size: 12px; margin-top: 15px; }
        .info-text div { margin-bottom: 8px; }
        .footer { background: white; border: var(--border-black); padding: 15px; text-align: center; font-weight: bold; font-size: 12px; width: 100%; box-sizing: border-box; }

        .hidden { display: none !important; }

        .camera-card { padding: 0; overflow: hidden; }
        .camera-topbar { background: black; color: white; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 12px; }
        .badge-scan { background: yellow; color: black; padding: 3px 8px; font-weight: bold; }
        
        .video-wrapper { position: relative; width: 100%; height: auto; background: #222; display: flex; justify-content: center; align-items: center; overflow: hidden; border-bottom: 2px solid black; border-top: 2px solid black; }
        
        #webcam { display: block; width: 100%; height: auto; transform: scaleX(-1); transition: filter 0.25s ease; }
        .blur-aktif { filter: blur(22px); }

        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); z-index: 5; pointer-events: none; }
        
        #angka-countdown { position: absolute; font-size: 90px; color: white; font-weight: bold; text-shadow: 4px 4px 0px black, -2px -2px 0px black; z-index: 10; }
        .camera-status { padding: 15px; font-family: monospace; font-size: 12px; }
        .status-box { border: 1px dashed black; padding: 10px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="landing-page" class="container">
        <div class="top-badge">TREND 2026 // SAL PRIADI</div>
        <div class="card">
            <div class="header-title"><div class="icon-box">📷</div><h1>Foto Kita<br>Blur</h1></div>
            <p>Hanya <strong>Telunjuk + Tengah</strong>.<br>Jempol naik atau tangan dikepal = blur mati.</p>
            <hr>
            <button onclick="mulaiAplikasi()">MULAI KAMERA</button>
            <hr class="dashed-line">
            <div class="info-text"><div>🔒 PRIVASI AMAN • DETEKSI KETAT</div></div>
        </div>
        <div class="footer">MADE WITH ❤️ BY ANDA</div>
    </div>

    <div id="camera-page" class="container hidden">
        <div class="card camera-card">
            <div class="camera-topbar"><span class="badge-scan">🔍 LIVE</span><span>• VIEWFINDER</span><span>🔊</span></div>
            
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
                <div id="angka-countdown" class="hidden">3</div>
            </div>

            <div class="camera-status">
                <div class="status-box">STATUS: <span id="status-text" style="color: red;">TELUNJUK + TENGAH SAJA</span></div>
                <div>🎵 SAL PRIADI - FOTO KITA BLUR</div>
            </div>
        </div>
        <div class="footer">MADE WITH ❤️ BY ANDA</div>
    </div>

    <audio id="musik" preload="auto">
        <source src="lagufotoblur.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const audio = document.getElementById('musik');
        const statusText = document.getElementById('status-text');
        const angkaCountdown = document.getElementById('angka-countdown');

        let isUnlocked = false;    
        let isCounting = false;    
        let countdownTimer;
        
        // Variabel untuk memastikan user menurunkan tangannya dulu sebelum bisa memicu ulang
        let butuhResetTangan = false; 

        // Logika saat lagu habis berputar
        audio.addEventListener('ended', () => {
            isUnlocked = false;
            isCounting = false;
            butuhResetTangan = true; 
            videoElement.classList.remove('blur-aktif');
            statusText.innerText = "LAGU HABIS, TURUNKAN TANGAN!";
            statusText.style.color = "red";
            audio.currentTime = 0; 
        });

        async function mulaiAplikasi() {
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});

            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('camera-page').classList.remove('hidden');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                videoElement.srcObject = stream;
            } catch (err) { alert("Izinkan kamera!"); return; }

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            // maxNumHands: 8 dan confidence diturunkan agar lebih gampang deteksi
            hands.setOptions({ 
                maxNumHands: 8, 
                modelComplexity: 0, 
                minDetectionConfidence: 0.4, 
                minTrackingConfidence: 0.4 
            });
            hands.onResults(onResults);

            async function prosesFrame() { 
                if(videoElement.videoWidth > 0) {
                    if(canvasElement.width !== videoElement.videoWidth) {
                        canvasElement.width = videoElement.videoWidth;
                        canvasElement.height = videoElement.videoHeight;
                    }
                    await hands.send({image: videoElement}); 
                }
                requestAnimationFrame(prosesFrame); 
            }
            videoElement.addEventListener('loadeddata', prosesFrame);
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            let gayaDuaJari = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Cek jarak antar sendi tangan agar fleksibel saat jauh/dekat
                    const telunjukNaik = landmarks[8].y < landmarks[6].y;
                    const tengahNaik   = landmarks[12].y < landmarks[10].y;
                    
                    const manisTurun = landmarks[16].y > landmarks[14].y;
                    const kelingkingTurun = landmarks[20].y > landmarks[18].y;

                    const jempolTurun = landmarks[4].y > landmarks[5].y - 0.03; 

                    if (telunjukNaik && tengahNaik && manisTurun && kelingkingTurun && jempolTurun) {
                        gayaDuaJari = true;
                        break; 
                    }
                }
            }

            canvasCtx.restore();

            // Jika lagu baru saja habis, paksa user menurunkan tangan (menghilangkan gestur)
            // agar hitung mundur tidak otomatis mengulang secara tidak sengaja.
            if (butuhResetTangan) {
                if (!gayaDuaJari) {
                    butuhResetTangan = false;
                    statusText.innerText = "TELUNJUK + TENGAH SAJA";
                }
                return;
            }

            // Memulai Hitung Mundur
            if (gayaDuaJari && !isUnlocked && !isCounting) {
                mulaiHitungMundur();
            } 
            // Membatalkan Hitung Mundur jika tangan diturunkan sebelum 3 detik
            else if (!gayaDuaJari && isCounting) {
                batalkanHitungMundur();
            }

            // Aktifkan blur jika sedang menghitung ATAU lagu sudah jalan dan tangan masih gaya
            if (isCounting || (isUnlocked && gayaDuaJari)) {
                videoElement.classList.add('blur-aktif');
            } else {
                videoElement.classList.remove('blur-aktif');
            }

            // Update Text Status
            if (isUnlocked) {
                statusText.innerText = gayaDuaJari ? 
                    "✅ BLUR NYALA / AUDIO PLAY" : 
                    "⭕ BLUR MATI";
                statusText.style.color = gayaDuaJari ? "#4ade80" : "#ffca3a";
            }
        }

        function mulaiHitungMundur() {
            isCounting = true;
            let waktu = 3;
            angkaCountdown.innerText = waktu;
            angkaCountdown.classList.remove('hidden');
            statusText.innerText = "TAHAN GESTUR... " + waktu;
            statusText.style.color = "#ffca3a";

            countdownTimer = setInterval(() => {
                waktu--;
                if (waktu > 0) {
                    angkaCountdown.innerText = waktu;
                    statusText.innerText = "TAHAN GESTUR... " + waktu;
                } else {
                    clearInterval(countdownTimer);
                    angkaCountdown.classList.add('hidden');
                    isUnlocked = true;
                    isCounting = false;
                    audio.play();
                    statusText.innerText = "✅ BLUR NYALA / AUDIO PLAY";
                    statusText.style.color = "#4ade80";
                }
            }, 1000);
        }

        function batalkanHitungMundur() {
            clearInterval(countdownTimer);
            isCounting = false;
            angkaCountdown.classList.add('hidden');
            statusText.innerText = "TELUNJUK + TENGAH SAJA";
            statusText.style.color = "red";
        }
    </script>
</body>
</html>
