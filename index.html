<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Kita Blur - Modern UI</title>
    <style>
        :root {
            --bg-grad-1: #0f2027;
            --bg-grad-2: #203a43;
            --bg-grad-3: #2c5364;
            --neon-blue: #00e5ff;
            --neon-green: #39ff14;
            --neon-red: #ff2a2a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            color: white;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            position: relative; 
        }

        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 30px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }
        
        .header-title h1 { 
            margin: 0; 
            font-size: 28px; 
            font-weight: 800;
            background: -webkit-linear-gradient(0deg, var(--neon-blue), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p { 
            font-size: 14px; 
            color: #d1d5db; 
            line-height: 1.5; 
            margin-bottom: 25px; 
        }

        button { 
            width: 100%; 
            background: linear-gradient(90deg, var(--neon-blue), #007bb5);
            color: white; 
            border: none; 
            border-radius: 12px;
            padding: 16px; 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 1px;
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.5);
        }
        
        button:active { 
            transform: translateY(2px); 
        }

        .info-text { 
            font-size: 11px; 
            color: #9ca3af; 
            margin-top: 20px; 
            letter-spacing: 0.5px;
        }

        .hidden { display: none !important; }

        .camera-card { 
            padding: 15px; 
        }

        .camera-topbar { 
            display: flex; 
            justify-content: space-between; 
            font-size: 12px; 
            font-weight: bold;
            margin-bottom: 15px;
            color: #9ca3af;
        }

        .badge-scan { 
            color: var(--neon-blue);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .badge-scan::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-blue);
        }
        
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 3/4; /* Proporsi kamera vertikal */
            background: #000; 
            border-radius: 16px;
            overflow: hidden; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        /* EFEK ZOOM & MIRROR: scale(1.25) membuat gambar lebih nge-zoom */
        #webcam, #output_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.25) scaleX(-1);
        }
        
        #webcam { transition: filter 0.25s ease; }
        .blur-aktif { filter: blur(20px); }

        #output_canvas { z-index: 5; pointer-events: none; }
        
        #angka-countdown { 
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px; 
            color: white; 
            font-weight: 900; 
            text-shadow: 0 0 20px rgba(0,0,0,0.8); 
            z-index: 10; 
        }

        .camera-status { 
            margin-top: 15px;
            padding: 15px; 
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            font-size: 13px; 
            text-align: center;
        }

        .status-box { 
            font-weight: bold; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        
        .song-title {
            color: #d1d5db;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div id="landing-page" class="container">
        <div class="card">
            <div class="header-title">
                <h1>FOTO KITA BLUR</h1>
            </div>
            <p>Hanya gunakan <strong>Telunjuk + Tengah</strong> (✌️).<br>Bisa dipakai beramai-ramai.<br>Jempol naik = blur mati.</p>
            <button onclick="mulaiAplikasi()">START CAMERA</button>
            <div class="info-text">SECURE SYSTEM • MULTI-HAND TRACKING</div>
        </div>
    </div>

    <div id="camera-page" class="container hidden">
        <div class="card camera-card">
            <div class="camera-topbar">
                <span class="badge-scan">LIVE TRACKING</span>
                <span>AI CAMERA</span>
            </div>
            
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
                <div id="angka-countdown" class="hidden">3</div>
            </div>

            <div class="camera-status">
                <div class="status-box">STATUS: <span id="status-text" style="color: var(--neon-red);">AWAITING GESTURE</span></div>
                <div class="song-title">🎵 Sal Priadi - Foto Kita Blur</div>
            </div>
        </div>
    </div>

    <audio id="musik" preload="auto">
        <source src="lagufotoblur.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const audio = document.getElementById('musik');
        const statusText = document.getElementById('status-text');
        const angkaCountdown = document.getElementById('angka-countdown');

        let isUnlocked = false;    
        let isCounting = false;    
        let countdownTimer;
        let butuhResetTangan = false; 

        audio.addEventListener('ended', () => {
            isUnlocked = false;
            isCounting = false;
            butuhResetTangan = true; 
            videoElement.classList.remove('blur-aktif');
            statusText.innerText = "LAGU HABIS, TURUNKAN TANGAN!";
            statusText.style.color = "var(--neon-red)";
            audio.currentTime = 0; 
        });

        async function mulaiAplikasi() {
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});

            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('camera-page').classList.remove('hidden');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                videoElement.srcObject = stream;
            } catch (err) { alert("Kamera perlu diizinkan untuk lanjut!"); return; }

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({ 
                maxNumHands: 8, // Mendukung hingga 8 tangan
                modelComplexity: 0, 
                minDetectionConfidence: 0.4, 
                minTrackingConfidence: 0.4 
            });
            hands.onResults(onResults);

            async function prosesFrame() { 
                if(videoElement.videoWidth > 0) {
                    if(canvasElement.width !== videoElement.videoWidth) {
                        canvasElement.width = videoElement.videoWidth;
                        canvasElement.height = videoElement.videoHeight;
                    }
                    await hands.send({image: videoElement}); 
                }
                requestAnimationFrame(prosesFrame); 
            }
            videoElement.addEventListener('loadeddata', prosesFrame);
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            let gayaDuaJari = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    
                    // --- MENGGAMBAR GARIS JARI ---
                    // Menggunakan warna neon cyan agar nyambung dengan tema
                    canvasCtx.strokeStyle = '#00e5ff';
                    canvasCtx.fillStyle = '#00e5ff';
                    canvasCtx.lineWidth = 2.5;
                    
                    const tulang = [[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20],[5,9,13,17]];
                    
                    canvasCtx.beginPath();
                    for (let j = 0; j < tulang.length; j++) {
                        let ruas = tulang[j];
                        for (let k = 0; k < ruas.length - 1; k++) {
                            canvasCtx.moveTo(landmarks[ruas[k]].x * canvasElement.width, landmarks[ruas[k]].y * canvasElement.height);
                            canvasCtx.lineTo(landmarks[ruas[k+1]].x * canvasElement.width, landmarks[ruas[k+1]].y * canvasElement.height);
                        }
                    }
                    canvasCtx.stroke();
                    
                    // Gambar titik-titik sendi
                    for (let i = 0; i < landmarks.length; i++) {
                        canvasCtx.beginPath();
                        canvasCtx.arc(landmarks[i].x * canvasElement.width, landmarks[i].y * canvasElement.height, 3, 0, 2 * Math.PI);
                        canvasCtx.fill();
                    }
                    // -----------------------------

                    // Logika Fleksibel (Dekat/Jauh)
                    const telunjukNaik = landmarks[8].y < landmarks[6].y;
                    const tengahNaik   = landmarks[12].y < landmarks[10].y;
                    const manisTurun = landmarks[16].y > landmarks[14].y;
                    const kelingkingTurun = landmarks[20].y > landmarks[18].y;
                    const jempolTurun = landmarks[4].y > landmarks[5].y - 0.03; 

                    if (telunjukNaik && tengahNaik && manisTurun && kelingkingTurun && jempolTurun) {
                        gayaDuaJari = true;
                    }
                }
            }

            canvasCtx.restore();

            if (butuhResetTangan) {
                if (!gayaDuaJari) {
                    butuhResetTangan = false;
                    statusText.innerText = "AWAITING GESTURE";
                    statusText.style.color = "var(--neon-red)";
                }
                return;
            }

            if (gayaDuaJari && !isUnlocked && !isCounting) {
                mulaiHitungMundur();
            } else if (!gayaDuaJari && isCounting) {
                batalkanHitungMundur();
            }

            if (isCounting || (isUnlocked && gayaDuaJari)) {
                videoElement.classList.add('blur-aktif');
            } else {
                videoElement.classList.remove('blur-aktif');
            }

            if (isUnlocked) {
                statusText.innerText = gayaDuaJari ? 
                    "EFFECT ACTIVE & PLAYING" : 
                    "BLUR DISABLED";
                statusText.style.color = gayaDuaJari ? "var(--neon-green)" : "#ffca3a";
            }
        }

        function mulaiHitungMundur() {
            isCounting = true;
            let waktu = 3;
            angkaCountdown.innerText = waktu;
            angkaCountdown.classList.remove('hidden');
            statusText.innerText = "HOLD GESTURE... " + waktu;
            statusText.style.color = "#ffca3a";

            countdownTimer = setInterval(() => {
                waktu--;
                if (waktu > 0) {
                    angkaCountdown.innerText = waktu;
                    statusText.innerText = "HOLD GESTURE... " + waktu;
                } else {
                    clearInterval(countdownTimer);
                    angkaCountdown.classList.add('hidden');
                    isUnlocked = true;
                    isCounting = false;
                    audio.play();
                    statusText.innerText = "EFFECT ACTIVE & PLAYING";
                    statusText.style.color = "var(--neon-green)";
                }
            }, 1000);
        }

        function batalkanHitungMundur() {
            clearInterval(countdownTimer);
            isCounting = false;
            angkaCountdown.classList.add('hidden');
            statusText.innerText = "AWAITING GESTURE";
            statusText.style.color = "var(--neon-red)";
        }
    </script>
</body>
</html>
