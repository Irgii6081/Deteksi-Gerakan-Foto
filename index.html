<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Cam Effects</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Container untuk Video dan Canvas */
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Overlay UI */
        #gif { position: absolute; width: 300px; bottom: 10%; left: 50%; transform: translateX(-50%); display: none; z-index: 10; pointer-events: none; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: #fff; font-weight: bold; z-index: 20; text-shadow: 2px 2px 10px #000; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 30; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; background: #a8c69f; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <img id="gif" src="Kicaumaniagif.gif" alt="overlay">
        <div id="countdown"></div>
        <div id="ui">
            <button id="startBtn">Mulai Kamera</button>
        </div>
    </div>
    <audio id="audio" src="Kicaumanialagu.mp3"></audio>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gif = document.getElementById('gif');
        const audio = document.getElementById('audio');
        const countdownEl = document.getElementById('countdown');
        const startBtn = document.getElementById('startBtn');
        
        let detector, isTriggered = false, frameCounter = 0, lastHands = [];

        async function init() {
            // Izin Kamera (Browser akan otomatis memunculkan pop-up)
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" } });
            video.srcObject = stream;
            
            // Setup Model Lite (Ringan)
            const model = handPoseDetection.SupportedModels.MediaPipeHands;
            detector = await handPoseDetection.createDetector(model, { 
                runtime: 'mediapipe', 
                modelType: 'lite', 
                solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands' 
            });
            
            canvas.width = 640; canvas.height = 480;
            startBtn.style.display = 'none';
            detectLoop();
        }

        async function detectLoop() {
            // Throttling: AI jalan tiap 3 frame
            if (frameCounter % 3 === 0) {
                lastHands = await detector.estimateHands(video);
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (lastHands.length > 0 && !isTriggered) {
                const hand = lastHands[0];
                drawHandSkeleton(hand); // Gambar garis tangan

                // Kalkulasi jarak wrist ke tengah layar (asumsi posisi hidung)
                const wrist = hand.keypoints[0];
                const dist = Math.sqrt(Math.pow(wrist.x - canvas.width/2, 2) + Math.pow(wrist.y - canvas.height/2, 2));

                // Trigger jika tangan dekat dengan tengah (hidung)
                if (dist < 150) {
                    startCountdown();
                }
            }

            frameCounter++;
            requestAnimationFrame(detectLoop);
        }

        function drawHandSkeleton(hand) {
            ctx.strokeStyle = "#a8c69f";
            ctx.lineWidth = 4;
            ctx.beginPath();
            hand.keypoints.forEach((kp, i) => {
                if(i === 0) ctx.moveTo(kp.x, kp.y);
                else ctx.lineTo(kp.x, kp.y);
            });
            ctx.stroke();
        }

        async function startCountdown() {
            isTriggered = true;
            let count = 3;
            
            const timer = setInterval(() => {
                countdownEl.innerText = count > 0 ? count : "";
                if (count < 0) {
                    clearInterval(timer);
                    playEffect();
                }
                count--;
            }, 1000);
        }

        function playEffect() {
            gif.style.display = 'block';
            audio.play();
            
            audio.onended = () => {
                gif.style.display = 'none';
                isTriggered = false; // Reset agar bisa diulang
            };
        }

        startBtn.onclick = init;
    </script>
</body>
</html>
